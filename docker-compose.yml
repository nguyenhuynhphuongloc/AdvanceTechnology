x-cloudinary-env: &cloudinary-env
  CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
  CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
  CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - advance-technology-network

  redis:
    image: redis:7.4-alpine
    container_name: redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - advance-technology-network

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--username", "admin", "--password", "password", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - advance-technology-network

  api-gateway:
    build:
      context: ./microservices/api-gateway
    container_name: api-gateway
    restart: always
    env_file:
      - ./microservices/api-gateway/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      AUTH_SERVICE_URL: http://authentication-service:3008
      USER_SERVICE_URL: http://user-service:3002
      PRODUCT_SERVICE_URL: http://product-service:3001
      ORDER_SERVICE_URL: http://order-service:3004
      CART_SERVICE_URL: http://cart-service:3007
      INVENTORY_SERVICE_URL: http://inventory-service:3006
      PAYMENT_SERVICE_URL: http://payment-service:3003
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
      LOGGING_SERVICE_URL: http://logging-service:3011
      AI_AGENT_SERVICE_URL: http://ai-agent-service:3010
    ports:
      - "3000:3000"
    volumes:
      - ./microservices/api-gateway:/app
      - api-gateway-node-modules:/app/node_modules
    command: npm run start:dev
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - advance-technology-network

  product-service:
    build:
      context: ./microservices/product-service
    container_name: product-service
    restart: always
    env_file:
      - ./microservices/product-service/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      <<: *cloudinary-env
      REDIS_ENABLED: ${PRODUCT_REDIS_ENABLED:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_TTL_PRODUCT_LIST: ${REDIS_TTL_PRODUCT_LIST:-120}
      REDIS_TTL_PRODUCT_DETAIL: ${REDIS_TTL_PRODUCT_DETAIL:-300}
      RABBITMQ_ENABLED: "true"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_EXCHANGE: commerce.events
    ports:
      - "3001:3001"
    volumes:
      - ./microservices/product-service:/app
      - product-service-node-modules:/app/node_modules
    command: npm run start:dev
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - advance-technology-network

  user-service:
    build:
      context: ./microservices/user-service
    container_name: user-service
    restart: always
    env_file:
      - ./microservices/user-service/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      RABBITMQ_ENABLED: ${PAYMENT_RABBITMQ_ENABLED:-true}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-commerce.events}
    ports:
      - "3002:3002"
    volumes:
      - ./microservices/user-service:/app
      - user-service-node-modules:/app/node_modules
    command: npm run start:dev
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - advance-technology-network

  payment-service:
    build:
      context: ./microservices/payment-service
    container_name: payment-service
    restart: always
    env_file:
      - ./microservices/payment-service/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      RABBITMQ_ENABLED: ${ORDER_RABBITMQ_ENABLED:-true}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-commerce.events}
    ports:
      - "3003:3003"
    volumes:
      - ./microservices/payment-service:/app
      - payment-service-node-modules:/app/node_modules
    command: npm run start:dev
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - advance-technology-network

  order-service:
    build:
      context: ./microservices/order-service
    container_name: order-service
    restart: always
    env_file:
      - ./microservices/order-service/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      RABBITMQ_ENABLED: true
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_EXCHANGE: commerce.events
      REDIS_URL: redis://redis:6379
    ports:
      - "3004:3004"
    volumes:
      - ./microservices/order-service:/app
      - order-service-node-modules:/app/node_modules
    command: npm run start:dev
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - advance-technology-network

  notification-service:
    build:
      context: ./microservices/notification-service
    container_name: notification-service
    restart: always
    env_file:
      - ./microservices/notification-service/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      REDIS_ENABLED: ${INVENTORY_REDIS_ENABLED:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      INVENTORY_HOLD_TTL_SECONDS: ${INVENTORY_HOLD_TTL_SECONDS:-600}
      RABBITMQ_ENABLED: ${INVENTORY_RABBITMQ_ENABLED:-true}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-commerce.events}
    ports:
      - "3005:3005"
    volumes:
      - ./microservices/notification-service:/app
      - notification-service-node-modules:/app/node_modules
    command: npm run start:dev
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - advance-technology-network

  inventory-service:
    build:
      context: ./microservices/inventory-service
    container_name: inventory-service
    restart: always
    env_file:
      - ./microservices/inventory-service/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      REDIS_ENABLED: ${CART_REDIS_ENABLED:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CART_TTL_SECONDS: ${CART_TTL_SECONDS:-1800}
      RABBITMQ_ENABLED: "true"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_EXCHANGE: commerce.events
      INVENTORY_HOLD_TTL_SECONDS: 600
    ports:
      - "3006:3006"
    volumes:
      - ./microservices/inventory-service:/app
      - inventory-service-node-modules:/app/node_modules
    command: npm run start:dev
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - advance-technology-network

  cart-service:
    build:
      context: ./microservices/cart-service
    container_name: cart-service
    restart: always
    env_file:
      - ./microservices/cart-service/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: "true"
      CART_TTL_SECONDS: 1800
    ports:
      - "3007:3007"
    volumes:
      - ./microservices/cart-service:/app
      - cart-service-node-modules:/app/node_modules
    command: npm run start:dev
    networks:
      - advance-technology-network

  authentication-service:
    build:
      context: ./microservices/authentication-service
    container_name: authentication-service
    restart: always
    env_file:
      - ./microservices/authentication-service/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      TYPEORM_SYNCHRONIZE: ${AUTH_TYPEORM_SYNCHRONIZE:-false}
    ports:
      - "3008:3008"
    volumes:
      - ./microservices/authentication-service:/app
      - authentication-service-node-modules:/app/node_modules
    command: npm run start:dev
    networks:
      - advance-technology-network


  logging-service:
    build:
      context: ./microservices/logging-service
    container_name: logging-service
    restart: always
    environment:
      CHOKIDAR_USEPOLLING: "true"
      PORT: "3011"
    ports:
      - "3011:3011"
    volumes:
      - ./microservices/logging-service:/app
      - logging-service-node-modules:/app/node_modules
    command: npm run start:dev
    networks:
      - advance-technology-network

  my-app:
    build:
      context: ./my-app
    container_name: my-app
    restart: always
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      API_GATEWAY_URL: http://api-gateway:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
      NODE_OPTIONS: "--max-old-space-size=4096"
      PORT: "3009"
    ports:
      - "3009:3009"
    volumes:
      - ./my-app:/app
      - my-app-node-modules:/app/node_modules
      - my-app-next:/app/.next
    command: pnpm exec next dev --port 3009 --hostname 0.0.0.0
    depends_on:
      - api-gateway
    networks:
      - advance-technology-network

networks:
  advance-technology-network:
    driver: bridge

volumes:
  rabbitmq-data:
  redis-data:
  mongodb-data:
  api-gateway-node-modules:
  product-service-node-modules:
  user-service-node-modules:
  authentication-service-node-modules:
  order-service-node-modules:
  cart-service-node-modules:
  inventory-service-node-modules:
  payment-service-node-modules:
  notification-service-node-modules:
  logging-service-node-modules:
  my-app-node-modules:
  my-app-next:
  chromadb-data:
