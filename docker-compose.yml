services:
  api-gateway:
    build:
      context: ./microservices/api-gateway
    container_name: api-gateway
    env_file:
      - ./microservices/api-gateway/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      AUTH_SERVICE_URL: http://authentication-service:3008
      USER_SERVICE_URL: http://user-service:3002
      PRODUCT_SERVICE_URL: http://product-service:3001
      ORDER_SERVICE_URL: http://order-service:3004
      CART_SERVICE_URL: http://cart-service:3007
      INVENTORY_SERVICE_URL: http://inventory-service:3006
      PAYMENT_SERVICE_URL: http://payment-service:3003
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
    ports:
      - "3000:3000"
    volumes:
      - ./microservices/api-gateway:/app
      - api-gateway-node-modules:/app/node_modules
    command: npm run start:dev
    depends_on:
      - authentication-service
      - user-service
      - product-service
      - order-service
      - cart-service
      - inventory-service
      - payment-service
      - notification-service
    networks:
      - advance-technology-network

  product-service:
    build:
      context: ./microservices/product-service
    container_name: product-service
    env_file:
      - ./microservices/product-service/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3001:3001"
    volumes:
      - ./microservices/product-service:/app
      - product-service-node-modules:/app/node_modules
    command: npm run start:dev
    networks:
      - advance-technology-network

  user-service:
    build:
      context: ./microservices/user-service
    container_name: user-service
    env_file:
      - ./microservices/user-service/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3002:3002"
    volumes:
      - ./microservices/user-service:/app
      - user-service-node-modules:/app/node_modules
    command: npm run start:dev
    networks:
      - advance-technology-network

  payment-service:
    build:
      context: ./microservices/payment-service
    container_name: payment-service
    env_file:
      - ./microservices/payment-service/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3003:3003"
    volumes:
      - ./microservices/payment-service:/app
      - payment-service-node-modules:/app/node_modules
    command: npm run start:dev
    networks:
      - advance-technology-network

  order-service:
    build:
      context: ./microservices/order-service
    container_name: order-service
    env_file:
      - ./microservices/order-service/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3004:3004"
    volumes:
      - ./microservices/order-service:/app
      - order-service-node-modules:/app/node_modules
    command: npm run start:dev
    networks:
      - advance-technology-network

  notification-service:
    build:
      context: ./microservices/notification-service
    container_name: notification-service
    env_file:
      - ./microservices/notification-service/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3005:3005"
    volumes:
      - ./microservices/notification-service:/app
      - notification-service-node-modules:/app/node_modules
    command: npm run start:dev
    networks:
      - advance-technology-network

  inventory-service:
    build:
      context: ./microservices/inventory-service
    container_name: inventory-service
    env_file:
      - ./microservices/inventory-service/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3006:3006"
    volumes:
      - ./microservices/inventory-service:/app
      - inventory-service-node-modules:/app/node_modules
    command: npm run start:dev
    networks:
      - advance-technology-network

  cart-service:
    build:
      context: ./microservices/cart-service
    container_name: cart-service
    env_file:
      - ./microservices/cart-service/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3007:3007"
    volumes:
      - ./microservices/cart-service:/app
      - cart-service-node-modules:/app/node_modules
    command: npm run start:dev
    networks:
      - advance-technology-network

  authentication-service:
    build:
      context: ./microservices/authentication-service
    container_name: authentication-service
    env_file:
      - ./microservices/authentication-service/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3008:3008"
    volumes:
      - ./microservices/authentication-service:/app
      - authentication-service-node-modules:/app/node_modules
    command: npm run start:dev
    networks:
      - advance-technology-network

  my-app:
    build:
      context: ./my-app
    container_name: my-app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
      PORT: "3009"
    ports:
      - "3009:3009"
    volumes:
      - ./my-app:/app
      - my-app-node-modules:/app/node_modules
      - my-app-next:/app/.next
    command: npm run dev -- --hostname 0.0.0.0 --port 3009
    depends_on:
      - api-gateway
    networks:
      - advance-technology-network

networks:
  advance-technology-network:
    driver: bridge

volumes:
  api-gateway-node-modules:
  product-service-node-modules:
  user-service-node-modules:
  authentication-service-node-modules:
  order-service-node-modules:
  cart-service-node-modules:
  inventory-service-node-modules:
  payment-service-node-modules:
  notification-service-node-modules:
  my-app-node-modules:
  my-app-next:
